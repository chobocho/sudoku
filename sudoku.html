<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🧩 스도쿠 마스터</title>
<style>
/* ── 오프라인 전용 — 시스템 폰트만 사용 ── */
:root {
  --font-display: 'SF Pro Rounded', 'Trebuchet MS', 'Century Gothic',
                  'Arial Rounded MT Bold', ui-rounded, system-ui, sans-serif;
  --font-ui:      -apple-system, BlinkMacSystemFont, 'Malgun Gothic',
                  '맑은 고딕', 'Apple SD Gothic Neo', 'Nanum Gothic',
                  sans-serif;
}

/* ── 다크 모드 (기본) ── */
:root {
  --bg:#0a0a14; --surface:#12121f; --card:#1a1a2e; --border:#2a2a4a;
  --accent:#7c3aed; --accent2:#06b6d4; --accent3:#f59e0b;
  --error:#ef4444; --success:#10b981;
  --text:#e2e8f0; --text-dim:#64748b; --given:#a5b4fc;
  --glow:0 0 20px rgba(124,58,237,0.4);
  --cell-hover:#1e1e36; --cell-sel:#2d1b69; --cell-hl:#1c1c30;
  --box-border:#4a4a7a; --cell-error-bg:#2d1218;
  --board-glow:0 0 30px rgba(124,58,237,.15);
  --board-inset:inset 0 1px 0 rgba(255,255,255,.05);
  --overlay-bg:rgba(5,5,15,.93);    /* 블러 제거 보완: 불투명도 높임 */
  --pause-bg:rgba(10,10,20,.95);    /* 블러 제거 보완 */
  --tdd-bg:rgba(5,5,15,.97);        /* 블러 제거 보완 */
  --cs:52px;
}
/* ── 라이트 모드 ── */
html.light {
  --bg:#f0f4ff; --surface:#ffffff; --card:#ffffff; --border:#d1d9f0;
  --accent:#6d28d9; --accent2:#0891b2; --accent3:#d97706;
  --error:#dc2626; --success:#059669;
  --text:#1e1b4b; --text-dim:#6b7280; --given:#4f46e5;
  --glow:0 0 16px rgba(109,40,217,0.25);
  --cell-hover:#ede9fe; --cell-sel:#ddd6fe; --cell-hl:#e0e7ff;
  --box-border:#a5b4fc; --cell-error-bg:#fee2e2;
  --board-glow:0 4px 24px rgba(109,40,217,.12);
  --board-inset:inset 0 1px 0 rgba(255,255,255,.8);
  --overlay-bg:rgba(30,27,75,.72);   /* 블러 제거 보완 */
  --pause-bg:rgba(240,244,255,.97);  /* 블러 제거 보완 */
  --tdd-bg:rgba(240,244,255,.98);    /* 블러 제거 보완 */
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--bg);color:var(--text);
  font-family:var(--font-ui);
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
  transition:background .35s, color .35s;
}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%,rgba(124,58,237,.12) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 90%,rgba(6,182,212,.08) 0%,transparent 60%);
  transition:opacity .4s;
}
html.light body::before{
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%,rgba(109,40,217,.07) 0%,transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 90%,rgba(8,145,178,.05) 0%,transparent 60%);
}

#app{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  height:100vh;height:100dvh;
  padding:6px 8px 4px;
  gap:4px;
  overflow:hidden;
}

/* HEADER */
header{
  display:flex;align-items:center;justify-content:center;
  gap:10px;width:100%;flex-shrink:0;padding:2px 0;
}
#logo{
  font-family:var(--font-display);
  font-size:clamp(.95rem,3.2vw,1.45rem);
  font-weight:900;letter-spacing:.04em;
  background:linear-gradient(135deg,#a78bfa,#06b6d4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 12px rgba(124,58,237,.6));
  cursor:pointer;user-select:none;
  padding:2px 4px;border-radius:6px;transition:filter .2s;
}
#logo.tap-flash{filter:drop-shadow(0 0 22px rgba(245,158,11,1));}

/* THEME TOGGLE */
#theme-btn{
  flex-shrink:0;
  width:34px;height:34px;border-radius:50%;
  border:1.5px solid var(--border);
  background:var(--card);
  cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s;box-shadow:none;
  line-height:1;
}
#theme-btn:hover{border-color:var(--accent);box-shadow:var(--glow);transform:rotate(20deg) scale(1.1);}
html.light #theme-btn{background:var(--surface);}

/* DIFFICULTY */
.diff-bar{display:flex;gap:6px;flex-shrink:0;}
.diff-btn{
  padding:4px 12px;border:1.5px solid var(--border);
  background:var(--card);color:var(--text-dim);
  border-radius:50px;cursor:pointer;
  font-family:var(--font-ui);font-size:.72rem;transition:all .2s;
}
.diff-btn:hover{border-color:var(--accent);color:var(--text);}
.diff-btn.active{
  border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:var(--glow);
  cursor:default;        /* 같은 난이도: 포인터 커서 제거 */
  pointer-events:none;   /* 클릭 이벤트 자체 차단 (CSS 레벨) */
  opacity:.85;
}

/* STATS */
.stats-bar{
  display:flex;gap:10px;flex-shrink:0;
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:4px 14px;
}
.stat{text-align:center;}
.stat-label{font-size:.58rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;}
.stat-value{font-family:var(--font-display);font-size:.82rem;font-weight:700;}
#timer-val{color:var(--accent2);}
#mistakes-val{color:var(--error);}
#hints-val{color:var(--accent3);}

/* BOARD */
.board-wrap{
  flex-shrink:0;
  background:var(--card);border:2px solid var(--border);
  border-radius:14px;padding:7px;
  box-shadow:var(--board-glow),var(--board-inset);
  position:relative;
  transition:background .35s, border-color .35s, box-shadow .35s;
}
.board-wrap.paused::after{
  content:'⏸  일시정지';
  position:absolute;inset:0;
  background:var(--pause-bg);
  /* backdrop-filter 제거: 모바일 GPU 렌더링 병목 해소 */
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:1.1rem;
  color:var(--accent);letter-spacing:.08em;z-index:10;
}
#board{
  display:grid;
  grid-template-columns:repeat(9,var(--cs));
  grid-template-rows:repeat(9,var(--cs));
  gap:2px;
}
.cell{
  width:var(--cs);height:var(--cs);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-size:.95rem;font-weight:700;
  background:var(--surface);border:1px solid var(--border);
  cursor:pointer;position:relative;
  transition:background .12s,transform .1s,box-shadow .12s,border-color .35s;
  border-radius:3px;user-select:none;
}
.cell.box-right{border-right:2px solid var(--box-border);}
.cell.box-bottom{border-bottom:2px solid var(--box-border);}
.cell:hover:not(.given):not(.locked){background:var(--cell-hover);transform:scale(1.04);}
.cell.selected{background:var(--cell-sel);box-shadow:inset 0 0 0 2px var(--accent),var(--glow);z-index:2;}
.cell.highlight{background:var(--cell-hl);}
.cell.given{color:var(--given);cursor:default;}
.cell.locked{cursor:default;}
.cell.error{color:var(--error);animation:shake .3s;background:var(--cell-error-bg);}
.cell.hint-cell{color:var(--success);animation:glow-pulse .6s ease;}
.cell .notes{display:grid;grid-template-columns:repeat(3,1fr);position:absolute;inset:2px;pointer-events:none;}
.cell .note-num{font-size:.36rem;color:#6b7280;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);}

@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes glow-pulse{
  0%{box-shadow:inset 0 0 0 2px var(--success)}
  50%{box-shadow:inset 0 0 0 2px var(--success),0 0 18px rgba(16,185,129,.5)}
  100%{box-shadow:inset 0 0 0 2px var(--success)}
}

/* NUMPAD */
.numpad{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:center;}
.num-btn{
  width:var(--cs);height:calc(var(--cs)*.8);
  border:1.5px solid var(--border);
  background:var(--card);color:var(--text);
  border-radius:8px;font-family:var(--font-display);
  font-size:.9rem;font-weight:700;cursor:pointer;
  transition:all .15s;position:relative;
}
.num-btn:hover{border-color:var(--accent);background:var(--cell-hover);transform:translateY(-2px);box-shadow:var(--glow);}
.num-btn.full{opacity:.3;pointer-events:none;}
.count-badge{
  position:absolute;top:-5px;right:-5px;
  background:var(--accent);color:#fff;
  font-size:.48rem;border-radius:50%;
  width:13px;height:13px;display:flex;align-items:center;justify-content:center;
}

/* CONTROLS ROW */
.controls-row{
  display:flex;align-items:center;gap:6px;flex-shrink:0;
  flex-wrap:wrap;justify-content:center;
}
.act-btn{
  padding:6px 11px;border:1.5px solid var(--border);
  background:var(--card);color:var(--text);
  border-radius:50px;cursor:pointer;
  font-family:var(--font-ui);font-size:.72rem;
  display:flex;align-items:center;gap:4px;transition:all .15s;
}
.act-btn:hover{border-color:var(--accent2);color:var(--accent2);transform:translateY(-1px);}
.act-btn.danger:hover{border-color:var(--error);color:var(--error);}
.act-btn.hint-btn{border-color:var(--accent3);color:var(--accent3);}
.act-btn.hint-btn:hover{background:rgba(245,158,11,.1);}
.act-btn.pause-btn.active{border-color:var(--accent2);color:var(--accent2);background:rgba(6,182,212,.1);}
.act-btn:disabled{opacity:.3;pointer-events:none;}
/* light mode act-btn hover bg */
html.light .act-btn:hover{background:var(--cell-hl);}
.note-toggle{
  display:flex;align-items:center;gap:5px;cursor:pointer;
  color:var(--text-dim);font-size:.72rem;flex-shrink:0;
}
.note-toggle input{display:none;}
.toggle-track{width:28px;height:16px;background:var(--border);border-radius:8px;position:relative;transition:.2s;}
.toggle-track::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#888;transition:.2s;}
.note-toggle input:checked+.toggle-track{background:var(--accent2);}
.note-toggle input:checked+.toggle-track::after{left:14px;background:#fff;}

/* OVERLAYS */
.overlay{
  position:fixed;inset:0;z-index:100;
  background:var(--overlay-bg);
  /* backdrop-filter 제거: 모바일 GPU 렌더링 병목 해소 */
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .2s;
  will-change:opacity;
}
.overlay.show{opacity:1;pointer-events:all;}
.modal{
  background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:26px 28px;
  text-align:center;max-width:310px;width:90%;
  transform:scale(.9);transition:.3s;
  box-shadow:0 0 60px rgba(124,58,237,.3);
}
.overlay.show .modal{transform:scale(1);}
.modal h2{font-family:var(--font-display);font-size:1.2rem;margin-bottom:6px;
  background:linear-gradient(135deg,#a78bfa,#06b6d4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.modal p{color:var(--text-dim);margin-bottom:14px;font-size:.82rem;white-space:pre-line;line-height:1.6;}
.stars{font-size:1.6rem;margin-bottom:8px;}
.modal-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.modal-btn{
  padding:9px 22px;border:none;border-radius:50px;
  background:var(--accent);color:#fff;cursor:pointer;
  font-family:var(--font-ui);font-size:.85rem;font-weight:700;
  transition:.2s;box-shadow:var(--glow);
}
.modal-btn:hover{background:#6d28d9;transform:scale(1.04);}

/* START MODAL */
.start-logo{font-size:2.8rem;line-height:1;margin-bottom:6px;}

/* 로딩 스피너 */
.loading-spinner{
  display:none;
  width:28px;height:28px;margin:12px auto 4px;
  border:3px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
.loading-spinner.show{display:block;}
@keyframes spin{to{transform:rotate(360deg)}}
.start-diff-btn.loading{opacity:.5;pointer-events:none;}
.start-diff-btn.loading .sdiff-icon::after{content:' ⏳';}
#start-modal h2{margin-bottom:4px;}
.start-sub{font-size:.8rem;color:var(--text-dim);margin-bottom:12px;}

/* 이어하기 카드 */
.resume-card{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border:1.5px solid var(--accent);
  border-radius:14px;padding:10px 14px;margin-bottom:10px;text-align:left;
}
.resume-icon{font-size:1.6rem;flex-shrink:0;}
.resume-label{display:block;font-size:.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em;}
.resume-detail{display:block;font-size:.8rem;color:var(--text);font-weight:700;margin-top:2px;}
.start-resume-btn{width:100%;margin-bottom:4px;}
.start-divider{
  display:flex;align-items:center;gap:8px;
  margin:10px 0 8px;color:var(--text-dim);font-size:.72rem;
}
.start-divider::before,.start-divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}
/* 난이도 선택 버튼 3개 */
.start-diff-group{display:flex;flex-direction:column;gap:8px;width:100%;}
.start-diff-btn{
  display:flex;align-items:center;gap:12px;
  padding:10px 16px;border:1.5px solid var(--border);
  background:var(--surface);border-radius:14px;
  cursor:pointer;text-align:left;transition:all .18s;width:100%;
}
.start-diff-btn:hover,.start-diff-btn:focus{
  border-color:var(--accent);background:var(--cell-hl);
  transform:translateX(4px);box-shadow:var(--glow);outline:none;
}
.sdiff-icon{font-size:1.4rem;flex-shrink:0;width:28px;text-align:center;}
.sdiff-info{display:flex;flex-direction:column;flex:1;text-align:left;}
.sdiff-label{
  font-family:var(--font-display);font-size:.9rem;
  font-weight:700;color:var(--text);
}
.sdiff-desc{font-size:.68rem;color:var(--text-dim);margin-top:1px;}
.sdiff-badge{
  flex-shrink:0;font-size:.65rem;color:var(--accent3);
  background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);
  border-radius:8px;padding:2px 6px;white-space:nowrap;
  display:none;
}
.sdiff-badge.visible{display:inline-block;}

/* MAP POOL PANEL */
#map-panel{
  position:fixed;inset:0;z-index:150;
  background:var(--tdd-bg);
  /* backdrop-filter 제거: 모바일 GPU 렌더링 병목 해소 */
  display:flex;flex-direction:column;align-items:center;
  padding:20px 14px;
  opacity:0;pointer-events:none;transition:opacity .2s;overflow-y:auto;
  will-change:opacity;
}
#map-panel.show{opacity:1;pointer-events:all;}
#map-panel h3{font-family:var(--font-display);font-size:1rem;color:var(--accent2);margin-bottom:14px;}
#map-close{
  position:absolute;top:14px;right:16px;
  background:none;border:none;color:var(--text-dim);
  font-size:1.4rem;cursor:pointer;line-height:1;
}
.pool-stats{
  display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;justify-content:center;
}
.pool-stat-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:8px 16px;text-align:center;min-width:80px;
}
.pool-stat-card .ps-label{font-size:.65rem;color:var(--text-dim);text-transform:uppercase;}
.pool-stat-card .ps-val{font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--accent2);}
.map-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:14px;}
.map-act-btn{
  padding:8px 18px;border:1.5px solid var(--border);
  background:var(--card);color:var(--text);
  border-radius:50px;cursor:pointer;
  font-family:var(--font-ui);font-size:.8rem;
  transition:all .2s;
}
.map-act-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.map-act-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.map-act-btn.primary:hover{background:#6d28d9;}
#map-import-msg{
  font-size:.78rem;padding:8px 14px;border-radius:10px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text-dim);display:none;text-align:center;
}
#map-import-msg.show{display:block;}
#map-import-msg.success{border-color:var(--success);color:var(--success);}
#map-import-msg.error{border-color:var(--error);color:var(--error);}

/* TDD PANEL */
#test-panel{
  position:fixed;inset:0;z-index:200;
  background:var(--tdd-bg);
  /* backdrop-filter 제거: 모바일 GPU 렌더링 병목 해소 */
  display:flex;flex-direction:column;align-items:center;
  padding:20px 14px 20px;
  opacity:0;pointer-events:none;transition:opacity .2s;overflow-y:auto;
  will-change:opacity;
}
#test-panel.show{opacity:1;pointer-events:all;}
#test-panel h3{font-family:var(--font-display);font-size:.95rem;color:var(--accent3);margin-bottom:10px;}
#test-close{
  position:absolute;top:14px;right:16px;
  background:none;border:none;color:var(--text-dim);
  font-size:1.4rem;cursor:pointer;line-height:1;
}
#test-output{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:12px;
  font-family:monospace;font-size:.7rem;color:var(--text);
  white-space:pre-wrap;line-height:1.7;
  width:100%;max-width:600px;
}
.t-pass{color:var(--success);}
.t-fail{color:var(--error);}
.t-info{color:var(--accent2);}
.t-group{color:var(--accent3);font-weight:bold;}
</style>
</head>
<body>
<div id="app">

  <header>
    <span id="logo">🧩 스도쿠 마스터</span>
    <button id="map-btn" title="맵 풀 관리" style="flex-shrink:0;width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .25s;">🗂️</button>
    <button id="theme-btn" title="테마 전환">🌙</button>
  </header>

  <div class="diff-bar" id="diff-bar">
    <button class="diff-btn active" data-diff="easy">🌱 초급</button>
    <button class="diff-btn" data-diff="medium">🔥 중급</button>
    <button class="diff-btn" data-diff="hard">💀 고급</button>
  </div>

  <div class="stats-bar">
    <div class="stat"><div class="stat-label">⏱️ 시간</div><div class="stat-value" id="timer-val">00:00</div></div>
    <div class="stat"><div class="stat-label">❌ 실수</div><div class="stat-value" id="mistakes-val">0</div></div>
    <div class="stat"><div class="stat-label">💡 힌트</div><div class="stat-value" id="hints-val">3</div></div>
  </div>

  <div class="board-wrap" id="board-wrap">
    <div id="board"></div>
  </div>

  <div class="numpad" id="numpad"></div>

  <div class="controls-row">
    <button class="act-btn" id="btn-undo">↩️ 되돌리기</button>
    <button class="act-btn hint-btn" id="btn-hint">💡 힌트</button>
    <button class="act-btn" id="btn-erase">🗑️ 지우기</button>
    <button class="act-btn pause-btn" id="btn-pause">⏸️ 일시정지</button>
    <button class="act-btn danger" id="btn-new">🔄 새 게임</button>
    <label class="note-toggle">
      <input type="checkbox" id="note-mode">
      <span class="toggle-track"></span>✏️ 메모
    </label>
  </div>

</div>

<!-- 완료 모달 -->
<div class="overlay" id="complete-overlay">
  <div class="modal">
    <div class="stars" id="complete-stars">⭐⭐⭐</div>
    <h2>🎉 완성!</h2>
    <p id="complete-msg"></p>
    <div class="modal-btns">
      <button class="modal-btn" id="btn-play-again">🚀 다시 하기</button>
    </div>
  </div>
</div>

<!-- 시작 모달 -->
<div class="overlay show" id="start-overlay">
  <div class="modal" id="start-modal">
    <div class="start-logo">🧩</div>
    <h2>스도쿠 마스터</h2>

    <!-- 저장된 게임 있을 때만 표시 -->
    <div id="resume-section" style="display:none">
      <div class="resume-card">
        <div class="resume-icon">💾</div>
        <div class="resume-meta">
          <span class="resume-label">저장된 게임</span>
          <span id="resume-info" class="resume-detail"></span>
        </div>
      </div>
      <button class="modal-btn start-resume-btn" id="btn-resume">▶️ 이어서 하기</button>
      <div class="start-divider"><span>새 게임 시작</span></div>
    </div>

    <p class="start-sub" id="start-sub">난이도를 선택해 주세요</p>
    <div class="loading-spinner" id="start-spinner"></div>
    <div class="start-diff-group">
      <button class="start-diff-btn" data-diff="easy">
        <span class="sdiff-icon">🌱</span>
        <div class="sdiff-info">
          <span class="sdiff-label">초급</span>
          <span class="sdiff-desc">36개 단서 · 힌트 5회</span>
        </div>
        <span class="sdiff-badge" id="badge-easy"></span>
      </button>
      <button class="start-diff-btn" data-diff="medium">
        <span class="sdiff-icon">🔥</span>
        <div class="sdiff-info">
          <span class="sdiff-label">중급</span>
          <span class="sdiff-desc">27개 단서 · 힌트 3회</span>
        </div>
        <span class="sdiff-badge" id="badge-medium"></span>
      </button>
      <button class="start-diff-btn" data-diff="hard">
        <span class="sdiff-icon">💀</span>
        <div class="sdiff-info">
          <span class="sdiff-label">고급</span>
          <span class="sdiff-desc">20개 단서 · 힌트 2회</span>
        </div>
        <span class="sdiff-badge" id="badge-hard"></span>
      </button>
    </div>
  </div>
</div>

<!-- 난이도 변경 시 저장 확인 모달 -->
<div class="overlay" id="save-confirm-overlay">
  <div class="modal">
    <div class="stars">💾</div>
    <h2 id="save-confirm-title">게임을 저장할까요?</h2>
    <p id="save-confirm-msg">현재 진행 중인 게임을 저장하고<br>난이도를 변경합니다.</p>
    <div class="modal-btns">
      <button class="modal-btn" id="btn-save-yes">💾 저장하고 변경</button>
      <button class="modal-btn" style="background:var(--surface);border:1.5px solid var(--border);color:var(--text);box-shadow:none;" id="btn-save-no">🗑️ 저장 안 함</button>
      <button class="modal-btn" style="background:transparent;border:1.5px solid var(--border);color:var(--text-dim);box-shadow:none;font-size:.78rem;" id="btn-save-cancel">취소</button>
    </div>
  </div>
</div>

<!-- 맵 풀 관리 패널 -->
<div id="map-panel">
  <button id="map-close">✕</button>
  <h3>🗂️ 퍼즐 맵 풀 관리</h3>
  <div class="pool-stats">
    <div class="pool-stat-card"><div class="ps-label">🌱 초급</div><div class="ps-val" id="pool-cnt-easy">-</div></div>
    <div class="pool-stat-card"><div class="ps-label">🔥 중급</div><div class="ps-val" id="pool-cnt-medium">-</div></div>
    <div class="pool-stat-card"><div class="ps-label">💀 고급</div><div class="ps-val" id="pool-cnt-hard">-</div></div>
  </div>
  <div class="map-actions">
    <button class="map-act-btn primary" id="btn-map-download">⬇️ 맵 다운로드</button>
    <button class="map-act-btn" id="btn-map-upload-trigger">⬆️ 맵 업로드</button>
    <button class="map-act-btn" id="btn-map-refill">🔄 풀 보충</button>
  </div>
  <input type="file" id="map-file-input" accept=".json" style="display:none">
  <div id="map-import-msg"></div>
</div>

<!-- TDD 패널 (로고 3번 클릭) -->
<div id="test-panel">

  <div id="test-output">테스트를 실행하는 중...</div>
</div>

// ── PuzzlePool 모듈 ─────────────────────────────────
const PuzzlePool = (() => {
  // 메모리 내 풀: { easy:[], medium:[], hard:[] }
  let pool = { easy:[], medium:[], hard:[] };

  /* solution 배열 → 고유 해시 문자열 */
  function _hash(solution) {
    return solution.map(r => r.join('')).join('');
  }

  /* 중복 여부: 해시 비교 */
  function _isDuplicate(diff, map) {
    const h = _hash(map.solution);
    return pool[diff].some(m => _hash(m.solution) === h);
  }

  /* DB(localStorage)에 현재 풀 저장 */
  function saveToDb() {
    try {
      Object.keys(pool).forEach(d => {
        localStorage.setItem(poolKey(d), JSON.stringify(pool[d]));
      });
    } catch(e) {}
  }

  /* DB에서 풀 로드 → 메모리 풀에 병합 */
  function loadFromDb() {
    const loaded = {};
    try {
      Object.keys(pool).forEach(d => {
        const raw = localStorage.getItem(poolKey(d));
        if (raw) {
          const arr = JSON.parse(raw);
          if (Array.isArray(arr)) loaded[d] = arr;
        }
      });
    } catch(e) {}
    return loaded;
  }

  /* 초기화: 내장 맵 + DB 맵 병합 */
  function init() {
    // 1. 내장 맵으로 리셋
    pool = { easy: [], medium: [], hard: [] };
    Object.keys(BUILTIN_MAPS).forEach(d => {
      BUILTIN_MAPS[d].forEach(m => {
        pool[d].push({puzzle: m.puzzle.map(r=>[...r]), solution: m.solution.map(r=>[...r])});
      });
    });
    // 2. DB 저장 맵 병합 (중복 제외)
    const fromDb = loadFromDb();
    Object.keys(fromDb).forEach(d => {
      if (!pool[d]) return;
      fromDb[d].forEach(m => {
        if (m && Array.isArray(m.puzzle) && Array.isArray(m.solution) && !_isDuplicate(d, m)) {
          pool[d].push(m);
        }
      });
    });
  }

  /* 풀에서 맵 하나 꺼내기 (랜덤) — 없으면 null */
  function pick(diff) {
    const arr = pool[diff];
    if (!arr || arr.length === 0) return null;
    const idx = Math.floor(Math.random() * arr.length);
    const map = arr.splice(idx, 1)[0]; // 꺼내서 제거 (재사용 방지)
    // 꺼낸 후 DB 업데이트 (비동기)
    setTimeout(() => saveToDb(), 0);
    // 풀이 줄면 비동기 보충
    if (arr.length < POOL_TARGET / 2) _refillAsync(diff);
    return map;
  }

  /* 맵 추가 (중복 제외) */
  function add(diff, map) {
    if (!pool[diff]) return false;
    if (!map || !Array.isArray(map.puzzle) || !Array.isArray(map.solution)) return false;
    if (_isDuplicate(diff, map)) return false;
    pool[diff].push(map);
    return true;
  }

  /* 현재 풀 크기 */
  function count(diff) {
    return pool[diff] ? pool[diff].length : 0;
  }

  /* 전체 풀 JSON 내보내기 (다운로드용) */
  function exportAll() {
    const all = [];
    Object.keys(pool).forEach(d => {
      pool[d].forEach(m => all.push({difficulty: d, puzzle: m.puzzle, solution: m.solution}));
    });
    return JSON.stringify(all, null, 2);
  }

  /* JSON에서 맵 가져오기 (업로드용) — {added, skipped} 반환 */
  function importFrom(jsonStr) {
    let added = 0, skipped = 0;
    try {
      const arr = JSON.parse(jsonStr);
      if (!Array.isArray(arr)) return {added:0, skipped:0, error:'not an array'};
      arr.forEach(item => {
        const d = item.difficulty;
        if (!pool[d] || !Array.isArray(item.puzzle) || !Array.isArray(item.solution)) {
          skipped++; return;
        }
        if (add(d, {puzzle: item.puzzle, solution: item.solution})) added++;
        else skipped++;
      });
      if (added > 0) saveToDb();
    } catch(e) {
      return {added: 0, skipped: 0, error: e.message};
    }
    return {added, skipped};
  }

  /* 비동기 풀 보충 (백그라운드) */
  function _refillAsync(diff) {
    const needed = POOL_TARGET - (pool[diff] ? pool[diff].length : 0);
    if (needed <= 0) return;
    const clues = DIFFICULTY[diff] ? DIFFICULTY[diff].clues : 36;
    let filled = 0;
    function fillOne() {
      if (filled >= needed) { saveToDb(); return; }
      const {puzzle, solution} = SudokuGenerator.generate(clues);
      add(diff, {puzzle, solution});
      filled++;
      setTimeout(fillOne, 10); // 10ms 간격으로 하나씩 (메인 스레드 양보)
    }
    setTimeout(fillOne, 50); // 첫 실행은 50ms 뒤 (UI 우선)
  }

  /* 모든 난이도 비동기 보충 */
  function refillAllAsync() {
    Object.keys(pool).forEach(d => _refillAsync(d));
  }

  return { init, pick, add, count, exportAll, importFrom, saveToDb, loadFromDb, _hash, refillAllAsync };
})();

const ThemeManager = (() => {

    document.documentElement.classList.toggle('light', isLight);
    document.getElementById('theme-btn').textContent = isLight ? '☀️' : '🌙';
    localStorage.setItem(THEME_KEY, theme);
  }

    const current = document.documentElement.classList.contains('light') ? 'light' : 'dark';
    apply(current === 'light' ? 'dark' : 'light');
  }
  function init() {
    const saved = localStorage.getItem(THEME_KEY);
    // 저장 없으면 시스템 설정 따름
    if (saved) { apply(saved); }
    else if (window.matchMedia('(prefers-color-scheme: light)').matches) { apply('light'); }
    else { apply('dark'); }
  }
  return { init, toggle, apply };
})();

// ── 1. 셀 크기 자동 계산 (Fold / 일반 화면 모두 대응) ──
function calcCellSize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  // 보드 외 UI 높이: header(34) + diff(30) + stats(36) + numpad(num_h) + controls(34) + gaps(40)
  // numpad 높이는 cs*0.8 + 5gap ≈ cs*0.8+5
  // 반복 계산 대신 비율로 추정
  const uiRows = 34+30+36+34+40; // ~174px (numpad 제외)
  // numpad 높이 ≈ cs*0.8 + 10
  // board 높이 ≈ 9*cs + 9*2 + 14 + 4 = 9cs+36
  // total ≈ 174 + cs*0.8+10 + 9cs+36 = 220 + 9.8cs ≤ vh
  // → cs ≤ (vh-220)/9.8
  const maxByH = Math.floor((vh - 220) / 9.8);
  const overhead = 9*2 + 14 + 4; // gap+padding+border
  const maxByW = Math.floor((vw - 20 - overhead) / 9);
  const cs = Math.max(28, Math.min(maxByH, maxByW, 60));
  document.documentElement.style.setProperty('--cs', cs + 'px');
  return cs;
}

// ── 2. 스도쿠 생성기 ────────────────────────────────
const SudokuGenerator = (() => {
  function shuffle(arr) {
    for (let i=arr.length-1;i>0;i--) {
      const j=Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]]=[arr[j],arr[i]];
    }
    return arr;
  }
  function isValid(board,row,col,num) {
    for (let c=0;c<9;c++) if (board[row][c]===num) return false;
    for (let r=0;r<9;r++) if (board[r][col]===num) return false;
    const br=Math.floor(row/3)*3, bc=Math.floor(col/3)*3;
    for (let r=0;r<3;r++) for (let c=0;c<3;c++) if (board[br+r][bc+c]===num) return false;
    return true;
  }
  function solve(board, startIdx=0) {
    // startIdx부터 탐색: 이미 확인한 칸을 다시 훑지 않아 재귀 호출마다 O(n) → 총 연산량 획기적 감소
    for (let i=startIdx; i<81; i++) {
      const r=Math.floor(i/9), c=i%9;
      if (board[r][c]===0) {
        for (const n of shuffle([1,2,3,4,5,6,7,8,9])) {
          if (isValid(board,r,c,n)) {
            board[r][c]=n;
            if (solve(board, i+1)) return true;  // 다음 인덱스부터 탐색
            board[r][c]=0;
          }
        }
        return false;
      }
    }
    return true;
  }
  function generate(clueCount) {
    const solution=Array.from({length:9},()=>Array(9).fill(0));
    solve(solution);
    const puzzle=solution.map(r=>[...r]);
    const positions=shuffle([...Array(81).keys()]);
    let removed=0;
    for (const pos of positions) {
      if (removed>=81-clueCount) break;
      puzzle[Math.floor(pos/9)][pos%9]=0;
      removed++;
    }
    return {puzzle,solution};
  }
  return {generate,isValid,solve};
})();

// ── 3. 게임 상태 ─────────────────────────────────────
const GameState = (() => {
  let state={};

  function init(difficulty) {
    const diff=DIFFICULTY[difficulty]||DIFFICULTY.easy;
    // Pool에서 즉시 꺼내기 시도 → 없으면 실시간 생성
    const pooled = (typeof PuzzlePool !== 'undefined') ? PuzzlePool.pick(difficulty) : null;
    const {puzzle,solution} = pooled || SudokuGenerator.generate(diff.clues);
    state={
      difficulty,
      board:puzzle.map(r=>[...r]),
      solution,
      given:puzzle.map(r=>r.map(v=>v!==0)),
      notes:Array.from({length:9},()=>Array.from({length:9},()=>[])),
      selected:null,
      mistakes:0, hints:diff.hints,
      history:[], timerSecs:0,
      complete:false, noteMode:false, paused:false,
    };
    return state;
  }

  function loadRaw(raw) {
    try {
      if (!raw || !Array.isArray(raw.board) || !Array.isArray(raw.solution)) {
        throw new Error('invalid save data structure');
      }
      state = {...raw};
      // notes: 배열 보장
      state.notes = Array.isArray(raw.notes)
        ? raw.notes.map(row => Array.isArray(row)
            ? row.map(cell => Array.isArray(cell) ? [...cell] : [])
            : Array(9).fill(null).map(()=>[]))
        : Array.from({length:9}, () => Array.from({length:9}, ()=>[]));
      // given: 배열 보장
      state.given = Array.isArray(raw.given)
        ? raw.given
        : raw.board.map(r => r.map(v => v !== 0));
      state.paused   = false;
      state.history  = [];
      state.selected = null;
      return state;
    } catch(e) {
      // 데이터 손상 → 새 게임으로 폴백
      console.warn('[Sudoku] loadRaw failed, falling back to new game:', e.message);
      return init(raw && raw.difficulty ? raw.difficulty : 'easy');
    }
  }

  function getState() { return state; }
  function select(r,c) { state.selected={r,c}; }

  function placeNumber(r,c,num) {
    if (state.given[r][c]||state.complete||state.paused) return false;
    state.history.push({r,c,prevVal:state.board[r][c],prevNotes:[...state.notes[r][c]]});
    if (state.noteMode && num!==0) {
      const idx=state.notes[r][c].indexOf(num);
      if (idx>=0) state.notes[r][c].splice(idx,1);
      else state.notes[r][c].push(num);
      return {type:'note',r,c};
    }
    if (num!==0 && state.board[r][c]===num) return false;
    state.board[r][c]=num;
    if (num!==0) { state.notes[r][c]=[]; clearRelatedNotes(r,c,num); }
    const correct=num===0||state.solution[r][c]===num;
    if (num!==0&&!correct) state.mistakes++;
    const isComplete=checkComplete();
    return {type:'place',r,c,num,correct,isComplete};
  }

  function clearRelatedNotes(r,c,num) {
    for (let i=0;i<9;i++) {
      state.notes[r][i]=state.notes[r][i].filter(n=>n!==num);
      state.notes[i][c]=state.notes[i][c].filter(n=>n!==num);
    }
    const br=Math.floor(r/3)*3, bc=Math.floor(c/3)*3;
    for (let dr=0;dr<3;dr++) for (let dc=0;dc<3;dc++)
      state.notes[br+dr][bc+dc]=state.notes[br+dr][bc+dc].filter(n=>n!==num);
  }

  function undo() {
    if (!state.history.length) return null;
    const last=state.history.pop();
    state.board[last.r][last.c]=last.prevVal;
    state.notes[last.r][last.c]=[...last.prevNotes];
    return last;
  }

  function useHint() {
    if (state.hints<=0||!state.selected||state.complete||state.paused) return null;
    const {r,c}=state.selected;
    if (state.given[r][c]||state.board[r][c]===state.solution[r][c]) return null;
    state.history.push({r,c,prevVal:state.board[r][c],prevNotes:[...state.notes[r][c]]});
    state.board[r][c]=state.solution[r][c];
    state.notes[r][c]=[];
    clearRelatedNotes(r,c,state.solution[r][c]);
    state.hints--;
    const isComplete=checkComplete();
    return {r,c,num:state.solution[r][c],isComplete};
  }

  function checkComplete() {
    for (let r=0;r<9;r++) for (let c=0;c<9;c++)
      if (state.board[r][c]!==state.solution[r][c]) return false;
    state.complete=true;
    return true;
  }

  function countNum(num) {
    let n=0;
    for (let r=0;r<9;r++) for (let c=0;c<9;c++) if (state.board[r][c]===num) n++;
    return n;
  }

  function togglePause() { state.paused=!state.paused; return state.paused; }

  function serialise() {
    return JSON.stringify({
      ...state,
      selected:null, paused:false, history:[],
    });
  }

  return {init,loadRaw,getState,select,placeNumber,undo,useHint,countNum,togglePause,serialise};
})();

      cell.className='cell';
      cell.dataset.r=r; cell.dataset.c=c;
      if (c===2||c===5) cell.classList.add('box-right');
      if (r===2||r===5) cell.classList.add('box-bottom');
      boardEl.appendChild(cell);
    }
  }

  function renderBoard(state) {
    wrapEl.classList.toggle('paused',!!state.paused);
    const sel=state.selected;
    boardEl.querySelectorAll('.cell').forEach(cell=>{
      const r=+cell.dataset.r, c=+cell.dataset.c;
      cell.innerHTML='';
      cell.className='cell';
      if (c===2||c===5) cell.classList.add('box-right');
      if (r===2||r===5) cell.classList.add('box-bottom');
      const val=state.board[r][c];
      if (sel) {
        if (sel.r===r&&sel.c===c) cell.classList.add('selected');
        else if (sel.r===r||sel.c===c||(Math.floor(sel.r/3)===Math.floor(r/3)&&Math.floor(sel.c/3)===Math.floor(c/3)))
          cell.classList.add('highlight');
        if (val&&val===state.board[sel.r][sel.c]) cell.classList.add('selected');
      }
      if (state.given[r][c]) {
        cell.classList.add('given','locked');
        if (!state.paused) cell.textContent=val;
      } else if (val!==0) {
        cell.classList.add(state.solution[r][c]===val?'locked':'error');
        if (!state.paused) cell.textContent=val;
      } else if (!state.paused) {
        const na=state.notes[r][c];
        if (na.length>0) {
          const nd=document.createElement('div'); nd.className='notes';
          for (let n=1;n<=9;n++) {
            const sp=document.createElement('span'); sp.className='note-num';
            sp.textContent=na.includes(n)?n:'';
            nd.appendChild(sp);
          }
          cell.appendChild(nd);
        }
      }
    });
  }

  function buildNumpad() {
    numpadEl.innerHTML='';
    for (let n=1;n<=9;n++) {
      const btn=document.createElement('button');
      btn.className='num-btn'; btn.dataset.num=n; btn.textContent=n;
      numpadEl.appendChild(btn);
    }
  }

  function updateNumpad() {
    numpadEl.querySelectorAll('.num-btn').forEach(btn=>{
      const n=+btn.dataset.num, cnt=GameState.countNum(n);
      btn.classList.toggle('full',cnt>=9);
      let badge=btn.querySelector('.count-badge');
      if (!badge){badge=document.createElement('span');badge.className='count-badge';btn.appendChild(badge);}
      badge.textContent=cnt;
    });
  }

  function updateStats(st) { mistakesEl.textContent=st.mistakes; hintsEl.textContent=st.hints; }
  function updateTimer(s) {
    timerEl.textContent=`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  }
  function flashCell(r,c,cls) {
    const cell=boardEl.querySelector(`[data-r="${r}"][data-c="${c}"]`);
    if (!cell) return;
    cell.classList.add(cls); setTimeout(()=>cell.classList.remove(cls),600);
  }
  function highlightHintCell(r,c) {
    const cell=boardEl.querySelector(`[data-r="${r}"][data-c="${c}"]`);
    if (!cell) return;
    cell.classList.add('hint-cell'); setTimeout(()=>cell.classList.remove('hint-cell'),700);
  }
  return {buildBoard,renderBoard,buildNumpad,updateNumpad,updateStats,updateTimer,flashCell,highlightHintCell};
})();

// ── 5. 타이머 ─────────────────────────────────────────
const Timer = (() => {
  let iv=null, secs=0, cb=null;
  function start(startSecs,callback){
    stop(); secs=startSecs||0; cb=callback;
    iv=setInterval(()=>{ secs++; if(cb) cb(secs); },1000);
  }
  function pause(){ clearInterval(iv); iv=null; }
  function resume(){ if(!iv) iv=setInterval(()=>{ secs++; if(cb) cb(secs); },1000); }
  function stop(){ clearInterval(iv); iv=null; secs=0; }
  function getSeconds(){ return secs; }
  function setSeconds(s){ secs=s; }
  return {start,pause,resume,stop,getSeconds,setSeconds};
})();

// ── 6. 저장/불러오기 (난이도별 독립 슬롯 + 완전 방어 코드) ─
const Storage = (() => {

  /* localStorage 자체가 막혀 있는 환경(Safari 사생활 모드 등) 대비 */
  function _lsGet(key) {
    try { return localStorage.getItem(key); } catch(e) { return null; }
  }
  function _lsSet(key, val) {
    try { localStorage.setItem(key, val); return true; } catch(e) { return false; }
  }
  function _lsRemove(key) {
    try { localStorage.removeItem(key); } catch(e) {}
  }

  /* 저장 데이터 스키마 검증 — 필수 필드 없으면 null 반환 */
  function _validate(raw) {
    if (!raw || typeof raw !== 'object')           return null;
    if (!Array.isArray(raw.board))                 return null;
    if (raw.board.length !== 9)                    return null;
    if (!raw.board.every(r => Array.isArray(r) && r.length === 9)) return null;
    if (!Array.isArray(raw.solution))              return null;
    if (raw.solution.length !== 9)                 return null;
    if (!Array.isArray(raw.given))                 return null;
    if (!Array.isArray(raw.notes))                 return null;
    if (!DIFFICULTY[raw.difficulty])               return null;
    return raw;  // 검증 통과
  }

  function save(diff, timerSecs) {
    try {
      const raw = JSON.parse(GameState.serialise());
      raw.timerSecs = timerSecs;
      raw.savedAt   = Date.now();
      _lsSet(diffSaveKey(diff), JSON.stringify(raw));
    } catch(e) { /* 저장 실패는 조용히 무시 */ }
  }

  function load(diff) {
    try {
      const raw = _lsGet(diffSaveKey(diff));
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      return _validate(parsed);   // 검증 실패 시 null
    } catch(e) {
      // 파싱 실패 → 손상된 데이터 삭제
      _lsRemove(diffSaveKey(diff));
      return null;
    }
  }

  function clear(diff) {
    try {
      if (diff) _lsRemove(diffSaveKey(diff));
      else Object.keys(DIFFICULTY).forEach(d => _lsRemove(diffSaveKey(d)));
    } catch(e) {}
  }

  function loadAll() {
    const result = {};
    Object.keys(DIFFICULTY).forEach(d => { result[d] = load(d); });
    return result;
  }

  return { save, load, clear, loadAll };
})();

// ── 7. 게임 컨트롤러 ──────────────────────────────────
const GameController = (() => {

  function startGame(diff, savedData) {
    try {
      Timer.stop();
      let state;
      if (savedData) {
        state = GameState.loadRaw(savedData);  // loadRaw 내부도 방어됨
        // loadRaw가 폴백 후 새 게임을 시작했을 수 있으므로 state.difficulty 기준
        const t = (savedData && savedData.timerSecs) || 0;
        Timer.setSeconds(state.complete ? 0 : t);
        Renderer.updateTimer(Timer.getSeconds());
      } else {
        state = GameState.init(diff || 'easy');
        Storage.clear(diff);
      }
      calcCellSize();
      Renderer.buildBoard();
      Renderer.buildNumpad();
      Renderer.renderBoard(state);
      Renderer.updateNumpad();
      Renderer.updateStats(state);
      document.querySelectorAll('.diff-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.diff === state.difficulty));
      const noteEl = document.getElementById('note-mode');
      noteEl.checked = false; state.noteMode = false;
      const pb = document.getElementById('btn-pause');
      pb.textContent = '⏸️ 일시정지'; pb.classList.remove('active');
      Timer.start(Timer.getSeconds(), s => {
        Renderer.updateTimer(s);
        GameState.getState().timerSecs = s;
      });
    } catch(e) {
      // 최후 방어선: 모든 예외를 잡아서 새 easy 게임으로 복구
      console.error('[Sudoku] startGame failed, recovering:', e);
      Storage.clear();          // 손상 가능 데이터 전체 제거
      try {
        Timer.stop();
        const state = GameState.init('easy');
        calcCellSize();
        Renderer.buildBoard();
        Renderer.buildNumpad();
        Renderer.renderBoard(state);
        Renderer.updateNumpad();
        Renderer.updateStats(state);
        Renderer.updateTimer(0);
        Timer.start(0, s => { Renderer.updateTimer(s); GameState.getState().timerSecs = s; });
      } catch(e2) {
        // 진짜 최후: 페이지 재로드
        console.error('[Sudoku] recovery also failed, reloading:', e2);
        location.reload();
      }
    }
  }

  function handleCellClick(r,c) {
    if (GameState.getState().paused) return;
    GameState.select(r,c);
    Renderer.renderBoard(GameState.getState());
  }

  function handleNumberInput(num) {
    const st=GameState.getState();
    if (!st.selected||st.complete||st.paused) return;
    if (st.given[st.selected.r][st.selected.c]) return;
    const result=GameState.placeNumber(st.selected.r,st.selected.c,num);
    if (!result) return;
    if (result.type==='place'&&!result.correct&&num!==0)
      Renderer.flashCell(st.selected.r,st.selected.c,'error');
    Renderer.renderBoard(GameState.getState());
    Renderer.updateNumpad();
    Renderer.updateStats(GameState.getState());
    if (result.isComplete){ Timer.stop(); Storage.clear(GameState.getState().difficulty); setTimeout(showComplete,400); }
  }

  function handleHint() {
    const result=GameState.useHint();
    if (!result) return;
    Renderer.highlightHintCell(result.r,result.c);
    Renderer.renderBoard(GameState.getState());
    Renderer.updateNumpad();
    Renderer.updateStats(GameState.getState());
    if (result.isComplete){ Timer.stop(); Storage.clear(GameState.getState().difficulty); setTimeout(showComplete,600); }
  }

  function handleUndo() {
    if (!GameState.undo()) return;
    Renderer.renderBoard(GameState.getState());
    Renderer.updateNumpad();
    Renderer.updateStats(GameState.getState());
  }

  function handleErase() {
    const st=GameState.getState();
    if (!st.selected||st.paused) return;
    const {r,c}=st.selected;
    if (st.given[r][c]) return;
    GameState.placeNumber(r,c,0);
    Renderer.renderBoard(GameState.getState());
    Renderer.updateNumpad();
  }

  function handlePause() {
    const st=GameState.getState();
    if (st.complete) return;
    const isPaused=GameState.togglePause();
    const pb=document.getElementById('btn-pause');
    if (isPaused){ Timer.pause(); pb.textContent='▶️ 재개'; pb.classList.add('active'); }
    else { Timer.resume(); pb.textContent='⏸️ 일시정지'; pb.classList.remove('active'); }
    Renderer.renderBoard(GameState.getState());
  }

  function showComplete() {
    const st=GameState.getState(), t=Timer.getSeconds();
    let star, text;
    if (st.mistakes===0){ star='🏆🏆🏆'; text='실수 없이 완벽한 클리어!'; }
    else if (st.mistakes<=3){ star='⭐⭐⭐'; text='훌륭합니다! 거의 완벽해요!'; }
    else { star='⭐⭐'; text='스도쿠를 완성했어요!'; }
    text+=`\n⏱️ ${Math.floor(t/60)}분 ${t%60}초  ❌ 실수 ${st.mistakes}회`;
    document.getElementById('complete-stars').textContent=star;
    document.getElementById('complete-msg').textContent=text;
    document.getElementById('complete-overlay').classList.add('show');
  }

  return {startGame,handleCellClick,handleNumberInput,handleHint,handleUndo,handleErase,handlePause};
})();

/* ═══════════════════════════════════════════
   🔌 이벤트 바인딩

document.getElementById('board').addEventListener('click',e=>{
  const cell=e.target.closest('.cell');
  if (cell) GameController.handleCellClick(+cell.dataset.r,+cell.dataset.c);
});
document.getElementById('numpad').addEventListener('click',e=>{
  const btn=e.target.closest('.num-btn');
  if (btn) GameController.handleNumberInput(+btn.dataset.num);
});
document.addEventListener('keydown',e=>{
  if (e.key>='1'&&e.key<='9') GameController.handleNumberInput(+e.key);
  if (e.key==='Backspace'||e.key==='Delete'||e.key==='0') GameController.handleErase();
  if (e.key==='z'&&(e.ctrlKey||e.metaKey)){e.preventDefault();GameController.handleUndo();}
  if (e.key==='Escape') document.getElementById('test-panel').classList.remove('show');
  const st=GameState.getState();
  if (!st.selected||st.paused) return;
  let {r,c}=st.selected;
  const map={ArrowUp:[r-1,c],ArrowDown:[r+1,c],ArrowLeft:[r,c-1],ArrowRight:[r,c+1]};
  if (!map[e.key]) return;
  e.preventDefault();
  const [nr,nc]=map[e.key];
  if (nr>=0&&nr<9&&nc>=0&&nc<9) GameController.handleCellClick(nr,nc);
});

/* ── 난이도로 직접 게임 시작 (모달 없이, 비동기 렌더링으로 흰 화면 방지) ── */
function _startDiffDirectly(diff) {
  // 스피너 표시 + 버튼 비활성화 → 브라우저가 화면 업데이트 후 게임 생성
  const spinner = document.getElementById('start-spinner');
  const sub     = document.getElementById('start-sub');
  if (spinner) spinner.classList.add('show');
  if (sub)     sub.textContent = '게임을 준비하고 있어요... ⏳';
  // 클릭된 버튼 시각 피드백
  document.querySelectorAll('.start-diff-btn').forEach(b => b.classList.add('loading'));

  // rAF×2: 스피너 렌더링이 실제로 화면에 나타난 뒤 무거운 generate() 실행
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      try {
        const saved = Storage.load(diff);
        if (saved && !saved.complete) {
          GameController.startGame(null, saved);
        } else {
          Storage.clear(diff);
          GameController.startGame(diff);
        }
      } finally {
        // 스피너·버튼 복원 (정상/오류 모두)
        if (spinner) spinner.classList.remove('show');
        document.querySelectorAll('.start-diff-btn').forEach(b => b.classList.remove('loading'));
      }
    });
  });
}

/* ── 시작 모달 열기 헬퍼 ── */
// targetDiff: 특정 난이도로 포커싱, null이면 가장 최근 저장 기준
function _openStartModalForDiff(targetDiff) {
  try {
    let latestSave = null;
    if (targetDiff) {
      const s = Storage.load(targetDiff);      // 이미 검증된 데이터 또는 null
      latestSave = (s && !s.complete) ? s : null;
    } else {
      const allSaves = Storage.loadAll();
      const latestDiff = Object.keys(DIFFICULTY).reduce((best, d) => {
        const s = allSaves[d];
        if (!s || s.complete) return best;
        if (!best) return d;
        return (s.savedAt||0) >= (allSaves[best].savedAt||0) ? d : best;
      }, null);
      latestSave = latestDiff ? allSaves[latestDiff] : null;
    }

    if (latestSave) {
      const diffInfo = DIFFICULTY[latestSave.difficulty] || DIFFICULTY.easy;
      const t = latestSave.timerSecs || 0;
      document.getElementById('resume-info').textContent =
        `${diffInfo.label}  ⏱️ ${Math.floor(t/60)}:${String(t%60).padStart(2,'0')}  ❌ ${latestSave.mistakes}회`;
      document.getElementById('resume-section').style.display = 'block';
      document.getElementById('start-sub').textContent = '또는 새 게임을 시작하세요';
      document.getElementById('btn-resume').onclick = () => {
        document.getElementById('start-overlay').classList.remove('show');
        // 이어하기도 rAF로 즉각 반응성 보장
        const spinner = document.getElementById('start-spinner');
        if (spinner) spinner.classList.add('show');
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            GameController.startGame(null, latestSave);
            if (spinner) spinner.classList.remove('show');
          });
        });
      };
    } else {
      document.getElementById('resume-section').style.display = 'none';
      document.getElementById('start-sub').textContent = '난이도를 선택해 주세요';
      document.getElementById('btn-resume').onclick = null;
    }

    try { _updateStartModalBadges(); } catch(e) { /* 뱃지 실패는 모달 표시에 영향 없음 */ }
    document.getElementById('start-overlay').classList.add('show');

  } catch(e) {
    // 모달 자체가 실패하면 — 안전망: 손상 데이터 제거 후 빈 시작 모달 표시
    console.warn('[Sudoku] _openStartModalForDiff failed, showing clean modal:', e);
    Storage.clear();
    try {
      document.getElementById('resume-section').style.display = 'none';
      document.getElementById('start-sub').textContent = '난이도를 선택해 주세요';
      document.getElementById('btn-resume').onclick = null;
      document.getElementById('start-overlay').classList.add('show');
    } catch(e2) { /* DOM 자체 문제면 포기 */ }
  }
}

/* ── 시작 모달 난이도 뱃지 업데이트 ── */
function _updateStartModalBadges() {
  const all = Storage.loadAll();
  Object.keys(DIFFICULTY).forEach(diff => {
    const badge = document.getElementById('badge-' + diff);
    if (!badge) return;
    try {
      const data = all[diff];
      if (data && !data.complete && Array.isArray(data.board) && Array.isArray(data.given)) {
        const flat = data.board.flat();
        const gflat = data.given.flat();
        const total  = gflat.filter(v => !v).length;
        const filled = flat.filter((v, i) => !gflat[i] && v !== 0).length;
        const pct = total > 0 ? Math.round(filled / total * 100) : 0;
        badge.textContent = `💾 ${pct}%`;
        badge.classList.add('visible');
      } else {
        badge.textContent = '';
        badge.classList.remove('visible');
      }
    } catch(e) {
      badge.textContent = '';
      badge.classList.remove('visible');
    }
  });
}

const TestRunner = (() => {

  };
  const expect=v=>({
    toBe:e=>{ if(v!==e) throw new Error(`Expected ${JSON.stringify(e)}, got ${JSON.stringify(v)}`); },
    toBeTruthy:()=>{ if(!v) throw new Error(`Expected truthy, got ${v}`); },
    toBeFalsy:()=>{ if(v) throw new Error(`Expected falsy, got ${v}`); },
    toBeGreaterThan:n=>{ if(v<=n) throw new Error(`Expected >${n}, got ${v}`); },
    toBeType:t=>{ if(typeof v!==t) throw new Error(`Expected type ${t}`); },
  });

      // 각 행 검증
      for (let r=0;r<9;r++) {
        const s = new Set(board[r]);
        for (let n=1;n<=9;n++) if (!s.has(n)) throw new Error(`Row ${r} missing ${n}`);
      }
      // 각 열 검증
      for (let c=0;c<9;c++) {

      [1,2,3,4,5,6,7,8,9].forEach((n,i) => board[0][i] = n);

  function renderResults(res){
    let html='';
    for(const r of res){
      if(r.type==='group') html+=`<span class="t-group">\n▸ ${r.name}</span>\n`;
      else if(r.type==='pass') html+=`<span class="t-pass">  ✅ ${r.name}</span>\n`;
      else if(r.type==='fail') html+=`<span class="t-fail">  ❌ ${r.name}\n     └ ${r.error}</span>\n`;
      else if(r.type==='summary'){
        html+=`\n<span class="t-info">━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n📊 ${r.pass}/${r.total} 통과`;
        if(r.fail===0) html+=' 🎉 모든 테스트 통과!';
        html+=`</span>`;
      }
    }
    document.getElementById('test-output').innerHTML=html;
  }
  return {runAll,renderResults};
